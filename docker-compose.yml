services:
  # Redis - Message broker and state store
  redis:
    image: redis:7-alpine
    container_name: voice-agent-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - voice-agent-network

  # Combined Service - Orchestrator + Worker in one container
  # Runs FastAPI server, Celery worker, and Celery beat together
  voice-agent:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: voice-agent
    ports:
      - "8000:8000"
    environment:
      # Port (for FastAPI server)
      PORT: 8000

      # Redis
      REDIS_URL: redis://redis:6379/0

      # LiveKit credentials
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}

      # AI Service API Keys
      GROQ_API_KEY: ${GROQ_API_KEY}
      ASSEMBLY_API_KEY: ${ASSEMBLY_API_KEY}
      INWORLD_API_KEY: ${INWORLD_API_KEY}

      # Database (for transcript storage)
      DATABASE_URL: ${DATABASE_URL}

      # Orchestrator config
      MAX_BOTS: 50
      SESSION_TIMEOUT: 1800000

      # Worker config
      BOT_STARTUP_TIMEOUT: 30
      PYTHON_SCRIPT_PATH: /app/backend/agent/voice_assistant.py
      AGENT_LOG_DIR: /var/log/voice-agents

      # Python path for absolute imports
      PYTHONPATH: /app

      # Logging configuration
      LOG_LEVEL: ${LOG_LEVEL:-INFO}  # DEBUG, INFO, WARNING, ERROR, CRITICAL
      LOG_FORMAT: ${LOG_FORMAT:-console}  # console (dev) or json (prod)
      SERVICE_NAME: voice-agent

      # Orchestrator URL for agent heartbeat callbacks
      # Since everything runs in the same container, use localhost
      ORCHESTRATOR_URL: http://localhost:8000

      # TEST_MODE configuration (optional)
      TEST_MODE: ${TEST_MODE:-false}
      MOCK_REDIS: ${MOCK_REDIS:-false}
      MOCK_STUDENT_ID: ${MOCK_STUDENT_ID:-test_student_123}
      MOCK_CREDIT_BALANCE: ${MOCK_CREDIT_BALANCE:-999}

    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Mount for development (comment out for production)
      - ./backend:/app/backend
      # Voice agent logs (persistent storage)
      - voice-agent-logs:/var/log/voice-agents
    networks:
      - voice-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/orchestrator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend - React application (simplified dev interface)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: voice-agent-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - voice-agent
    networks:
      - voice-agent-network
    restart: unless-stopped

  # Standalone Voice Agent Server (for direct frontend testing)
  voice-agent-server:
    build:
      context: .
      dockerfile: backend/services/voice-agent-server/Dockerfile
    container_name: voice-agent-server
    ports:
      - "8001:8001"
    environment:
      # Server Configuration
      SERVER_PORT: 8001
      AGENT_SCRIPT_PATH: /app/backend/agent/voice_assistant.py

      # LiveKit Configuration
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}

      # AI Service API Keys
      GROQ_API_KEY: ${GROQ_API_KEY}
      ASSEMBLY_API_KEY: ${ASSEMBLY_API_KEY}
      INWORLD_API_KEY: ${INWORLD_API_KEY}

      # Voice Agent Configuration
      VOICE_ID: ${VOICE_AGENT_VOICE_ID:-Ashley}
      OPENING_LINE: ${VOICE_AGENT_OPENING_LINE:-Hello! I am ready for testing. How can I help you?}
      SYSTEM_PROMPT: ${VOICE_AGENT_SYSTEM_PROMPT:-You are a helpful AI voice assistant.}

      # Room Configuration
      AGENT_ROOM_NAME: ${AGENT_ROOM_NAME:-test-agent-room}
      AGENT_USER_ID: ${AGENT_USER_ID:-voice-agent}

      # Test Mode (always true for standalone server)
      TEST_MODE: true
      MOCK_REDIS: true  # Skip Redis connections in standalone mode

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    networks:
      - voice-agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redis-data:
    driver: local
  voice-agent-logs:
    driver: local

networks:
  voice-agent-network:
    driver: bridge
